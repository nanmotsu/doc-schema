<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>変換番号リセット確認サンプル4</title>
  <style>
:root {
    --h1-size:    28px;
    --h2-size:    24px;
    --h3-size:    20px;
    --body-size:  16px;
    --small-size: 13px;
    --font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
    --body-line-height:    1.3;
    --heading-line-height: 1.3;
    --color-text:    #333333;
    --color-heading: #111111;
    --color-heading-border: #2c3e50;
    --color-subtle:  #555555;
    --color-link:    #0066cc;
    --color-code:    #c7254e;
    --color-code-bg: #f9f2f4;
    --color-pre-bg:  #f6f8fa;
    --color-border:  #bdc3c7;
    --color-th-bg:   #f0f0f0;
    --table-cell-border: 1px solid #bdc3c7;
    --table-cell-padding: 0.45em 0.8em;
    --table-margin:       0 0;
    --gap-paragraph:   0.75em;
    --gap-heading-top: 2em;
    --gap-heading-bot: 0.5em;
    --toc-padding:      0.1em 0;
    --toc-item-padding: 0 0;
    --title-size:       36px;
    --subtitle-size:    18px;
    --cover-max-height: 360px;
    --page-content-height: calc(297mm - 18mm - 15mm);
}
@page {
    size: A4 portrait;
    margin: 18mm 12mm 15mm 15mm;
}
body { counter-reset: h1-counter; }
h1 { counter-reset: h2-counter; }
h2 { counter-reset: h3-counter; }
h1::before { counter-increment: h1-counter; content: counter(h1-counter) ". "; }
h2::before { counter-increment: h2-counter; content: counter(h1-counter) "." counter(h2-counter) ". "; }
h3::before { counter-increment: h3-counter; content: counter(h1-counter) "." counter(h2-counter) "." counter(h3-counter) ". "; }

.warning {
    color: #e67e00;
    background: #fff8f0;
    border-left: 4px solid #e67e00;
    padding: 0.2em 0.5em;
    margin: 0.5em 0;
    border-radius: 0 4px 4px 0;
    max-width: 100%;
}
.center {
    text-align: center;
}
.right {
    text-align: right;
}
.large {
    font-size: 24px;
}
.red {
    color: #cc0000;
}
.page-break {
    page-break-before: always;
    break-before: page;
}
.figure {
    margin: 0 0;
    text-align: center;
}
figure.figure figcaption {
    font-size: var(--small-size);
    color: #555;
    margin-top: 0;
    margin-bottom: 0;
}
.table-wrapper {
    margin: 0 0;
}
.table-wrapper .table-caption {
    font-size: var(--small-size);
    color: #555;
    margin-bottom: 0.5em;
    font-weight: bold;
    text-align: center;
}

/* ============================================================
   Markdown 文書 スタイルシート（構造定義のみ）
   CSS変数・DSLクラス・カウンター・@page は build.mjs がスキーマから生成する。
   ============================================================ */

/* === リセット ===================================================== */
*,
*::before,
*::after {
    box-sizing: border-box;
}

/* === ベース ======================================================= */
body {
    font-family: var(--font-family, 'Noto Sans JP', 'Meiryo', sans-serif);
    font-size: var(--body-size, 16px);
    line-height: var(--body-line-height, 1.8);
    color: var(--color-text, #333);
    padding: 20px;
    max-width: 860px;
    margin: 0 auto;
}

/* === 見出し ======================================================= */
h1,
h2,
h3,
h4 {
    margin-top: var(--gap-heading-top, 0.8em);
    margin-bottom: var(--gap-heading-bot, 0.5em);
    line-height: var(--heading-line-height, 1.3);
    font-weight: bold;
}

h1 {
    font-size: var(--h1-size, 28px);
    border-bottom: 2px solid var(--color-heading-border, #2c3e50);
    padding-bottom: 0.25em;
}

h2 {
    font-size: var(--h2-size, 24px);
    border-bottom: 1px solid var(--color-border, #bdc3c7);
    padding-bottom: 0.2em;
}

h3 {
    font-size: var(--h3-size, 20px);
}

h4 {
    font-size: var(--body-size, 16px);
}

/* === 本文要素 ===================================================== */
p {
    margin: var(--gap-paragraph) 0;
}

/* フロントマター paragraphIndent が有効なときのみ本文段落を字下げ */
body.indent-body>p {
    text-indent: 1em;
}

/* DSLブロック内・テーブルセル内の <p> はマージンを消す */
.warning p,
.center p,
.right p,
.large p,
.red p,
td p,
th p {
    margin: 0;
}

/* figure 内の <p> — marked が ![alt](src) を <p><img> にラップするため個別処理 */
/* margin を消し、line-height: 0 でインライン画像のベースライン余白も除去する   */
.figure p {
    margin: 0;
    line-height: 0;
}

ul,
ol {
    padding-left: 2em;
    margin: 0.5em 0;
}

li {
    margin: 0.3em 0;
}

blockquote {
    border-left: 4px solid var(--color-border);
    margin: 0.5em 0;
    padding: 0 1em;
    color: var(--color-subtle);
}

hr {
    border: none;
    border-top: 1px solid var(--color-border);
    margin: 2em 0;
}

a {
    color: var(--color-link, #2980b9);
}

/* === コード ======================================================= */
code {
    font-family: 'Consolas', 'Noto Sans Mono', 'Courier New', monospace;
    background: var(--color-code-bg);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-size: 0.88em;
}

pre {
    background: var(--color-pre-bg, #f6f8fa);
    border: 1px solid #d1d9e0;
    border-radius: 6px;
    padding: 1em 1.2em;
    overflow-x: auto;
    margin: 1em 0;
    line-height: 1.5;
}

pre code {
    background: none;
    padding: 0;
    font-size: 0.9em;
}

/* === 画像 ========================================================= */
img {
    max-width: 100%;
    height: auto;
}

/* === SVG（Mermaid等）============================================= */
figure.figure svg {
    max-width: 100%;
    height: auto;
}

/* SVG テキストのフォント指定（htmlLabels:false 時） */
figure.figure svg text {
    font-family: var(--font-family, 'Noto Sans JP', 'Meiryo', sans-serif);
}

/* コードを図として扱う場合は本文を左寄せにする */
figure.code-figure {
    text-align: left;
}

figure.code-figure pre {
    margin: 0;
}

figure.code-figure figcaption {
    text-align: center;
}

/* === テーブル ===================================================== */
table {
    border-collapse: collapse;
    width: 100%;
    margin: var(--table-margin, 1.5em 0);
}

th,
td {
    border: var(--table-cell-border, 1px solid #bdc3c7);
    padding: var(--table-cell-padding, 0.45em 0.8em);
    text-align: left;
}

th {
    background: var(--color-th-bg);
    font-weight: bold;
    white-space: nowrap;
}

/* colRatio / colWidths 指定時: table-layout: fixed に合わせてヘッダーも折り返し許可 */
table.col-fixed th {
    white-space: normal;
    word-break: break-word;
    overflow-wrap: break-word;
}

/* ============================================================
   表題ページ
   ============================================================ */
.title-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: var(--page-content-height, 277mm);
    text-align: center;
    padding: 40px;
    box-sizing: border-box;
    break-after: page;
    page-break-after: always;
}

.title-page .doc-title {
    font-size: var(--title-size, 36px);
    font-weight: bold;
    color: var(--color-heading, #111);
    margin: 0;
    line-height: 1.3;
}

.title-page .doc-subtitle {
    font-size: var(--subtitle-size, 18px);
    color: var(--color-subtle, #555);
    margin-top: 0.6em;
    margin-bottom: 0;
}

.title-page .cover-image {
    display: block;
    max-height: var(--cover-max-height, 360px);
    max-width: 100%;
    margin: 1.5em auto 0;
    object-fit: cover;
}

/* ============================================================
   改訂履歴ページ
   ============================================================ */
.revision-history {
    break-after: page;
    page-break-after: always;
    padding: 2em 0;
}

.revision-history-title {
    font-size: var(--h2-size, 24px);
    font-weight: bold;
    color: var(--color-heading, #111);
    border-bottom: 2px solid var(--color-heading-border, #2c3e50);
    padding-bottom: 0.2em;
    margin: 0 0 1em;
}

.revision-history .col-version {
    width: 8%;
    white-space: nowrap;
}

.revision-history .col-date {
    width: 18%;
    white-space: nowrap;
}

.revision-history .col-author {
    width: 14%;
    white-space: nowrap;
}

.revision-history .col-description {
    width: 60%;
}

/* ============================================================
   目次
   ============================================================ */
.toc {
    break-after: page;
    page-break-after: always;
    padding: var(--toc-padding, 2em 0);
}

.toc-title {
    font-size: var(--h2-size, 24px);
    font-weight: bold;
    color: var(--color-heading, #111);
    margin: 0 0 1em;
    padding-bottom: 0.3em;
    border-bottom: 2px solid var(--color-heading-border, #2c3e50);
}

.toc ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
}

.toc li {
    padding: var(--toc-item-padding, 0.3em 0);
    margin: 0;
    line-height: 1.5;
}

.toc a {
    color: var(--color-text, #333);
    text-decoration: none;
}

.toc a:hover {
    color: var(--color-link, #0066cc);
    text-decoration: underline;
}

/* ============================================================
   画面表示（HTML）
   ============================================================ */
@media screen {

    /* ページ区切り DSL の視覚的インジケーター（PDF では非表示） */
    .page-break {
        margin: 2em 0;
        border-top: 1px solid #aaa;
    }
}

/* ============================================================
   印刷 / PDF
   ============================================================ */
@media print {
    body {
        padding: 0;
        max-width: 100%;
    }

    .page-break {
        page-break-before: always;
        break-before: page;
    }

    h1,
    h2,
    h3 {
        page-break-after: avoid;
    }

    figure,
    .warning {
        page-break-inside: avoid;
    }

    /* 大きい表は分割を許可し、表番号だけ取り残されるのを防ぐ */
    .table-wrapper .table-caption {
        break-after: avoid;
        page-break-after: avoid;
        margin-bottom: 0.3em;
    }

    .table-wrapper table {
        break-before: avoid;
        page-break-before: avoid;
        break-inside: auto;
        page-break-inside: auto;
    }

    .table-wrapper thead {
        display: table-header-group;
    }

    .table-wrapper tr,
    .table-wrapper th,
    .table-wrapper td {
        break-inside: avoid;
        page-break-inside: avoid;
    }

    pre {
        white-space: pre-wrap;
        word-break: break-all;
        overflow-x: visible;
    }
}
ol.ol-style-l1-paren-decimal {
    list-style: none;
    counter-reset: ol-l1-counter;
    padding-left: 2.2em;
}
ol.ol-style-l1-paren-decimal > li {
    counter-increment: ol-l1-counter;
    position: relative;
}
ol.ol-style-l1-paren-decimal > li::before {
    content: "(" counter(ol-l1-counter) ") ";
    position: absolute;
    left: -2.2em;
    width: 2em;
    text-align: right;
}

ol.ol-style-l2-decimal { list-style-type: decimal; }
  </style>
</head>
