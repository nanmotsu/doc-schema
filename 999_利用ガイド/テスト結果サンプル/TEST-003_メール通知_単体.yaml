id: TEST-003
title: メール通知 単体テスト仕様書
version: "1.0"
date: "2026-05-22"
author: 担当者名
outputDir: ./evidence
cases:
  - id: TC-001
    title: 支援記録保存時の通知送信
    tested_at: "2026-05-22"
    tested_by: 田中
    steps:
      - id: TEST-003-TC001-S01
        subtitle: 通知メソッドを直接呼び出す
        action: NotifyService::send() に支援記録IDを渡す
        expected: メールキューに 1 件追加される
        evidence:
      - id: TEST-003-TC001-S02
        subtitle: キュー処理後に配信される
        action: キューワーカーを 1 ジョブ処理させる
        expected: 担当者のメールアドレス宛にメールが配信される
        evidence:
  - id: TC-002
    title: 無効なメールアドレスは通知しない
    tested_at: "2026-05-22"
    tested_by: 田中
    steps:
      - id: TEST-003-TC002-S01
        subtitle: 無効アドレスで送信を試みる
        action: NotifyService::send() にメールアドレス未設定のユーザーIDを渡す
        expected: 例外をスローせず、キューに追加されない
        evidence:
      - id: TEST-003-TC002-S02
        subtitle: 無効アドレスでの通知確認
        precondition: メールアドレス未設定のユーザーが存在すること
        action: NotifyService::send() にメールアドレス未設定のユーザーIDを渡す
        expected: 例外をスローせず、キューに追加されない
        evidence:
